name : Deploy nodejs application By using GithubActions

on:
 push:
  branches:
   - main
jobs:
 deploy:
  runs-on: ubuntu-latest

  steps:
  - name : Checkout code
   uses : actions/checkout@v4

  - name: Build and Start Containers
   run: docker compose up --build -d

  - name: Show running containers
   run: docker ps
